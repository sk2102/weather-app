<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>Search</button>
        </div>

        <div class="weather">
            <img src="https://openweathermap.org/img/wn/10d@2x.png" alt="weather icon" class="weather-icon">
    
            <h1 class="temp">25°C</h1>
            <h2 class="city">City Name</h2>
            <p class="description">Condition</p>
        </div>
       <div class="forecast-container">
    <div class="forecast-item">
        <p class="day">--</p>
        <img src="https://openweathermap.org/img/wn/01d.png" alt="icon" class="f-icon">
        <p class="f-temp">--°C</p>
    </div>
    <div class="forecast-item">
        <p class="day">--</p>
        <img src="https://openweathermap.org/img/wn/02d.png" alt="icon" class="f-icon">
        <p class="f-temp">--°C</p>
    </div>
    <div class="forecast-item">
        <p class="day">--</p>
        <img src="https://openweathermap.org/img/wn/03d.png" alt="icon" class="f-icon">
        <p class="f-temp">--°C</p>
    </div>
</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
